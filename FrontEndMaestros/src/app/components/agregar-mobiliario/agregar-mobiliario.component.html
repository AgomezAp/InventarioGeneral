<app-navbar></app-navbar>

<div class="mobiliario-container">
  <!-- ═══ HEADER DE PÁGINA ═══ -->
  <header class="page-header">
    <div class="page-header__left">
      <button
        class="page-header__back"
        (click)="cancelar()"
        aria-label="Volver"
      >
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="page-header__icon">
        <i class="fa-solid fa-chair"></i>
      </div>
      <div class="page-header__text">
        <h1 class="page-header__title">Registrar Mobiliario</h1>
        <p class="page-header__subtitle">
          Agregue un nuevo tipo de mobiliario al inventario con su stock inicial
        </p>
      </div>
    </div>
    <div class="page-header__actions">
      <div class="page-header__badge">
        <i class="fa-solid fa-building"></i>
        <span>Mobiliario</span>
      </div>
      <button type="button" class="btn btn--outline-light" (click)="cancelar()">
        <i class="fa-solid fa-xmark"></i> Cancelar
      </button>
      <button
        type="submit"
        form="mobiliarioForm"
        class="btn btn--primary"
        [disabled]="loading || mobiliarioForm.invalid"
      >
        <i
          class="fa-solid"
          [ngClass]="loading ? 'fa-spinner fa-spin' : 'fa-floppy-disk'"
        ></i>
        {{ loading ? "Guardando..." : "Guardar" }}
      </button>
    </div>
  </header>

  <!-- ═══ FORM ═══ -->
  <form
    [formGroup]="mobiliarioForm"
    (ngSubmit)="onSubmit()"
    id="mobiliarioForm"
    class="form-layout"
  >
    <!-- ══ COLUMNA IZQUIERDA ══ -->
    <div class="form-col">
      <!-- Card: Información Básica -->
      <div class="card" style="animation-delay: 0.06s">
        <div class="card__head">
          <i class="fa-solid fa-circle-info"></i>
          <h3 class="card__title">Información Básica</h3>
        </div>
        <div class="card__body">
          <div class="field-row">
            <div class="form-field">
              <label class="form-field__label" for="nombre"
                >Nombre <span class="form-field__req">*</span></label
              >
              <input
                class="form-field__input"
                [class.form-field__input--invalid]="isFieldInvalid('nombre')"
                type="text"
                id="nombre"
                formControlName="nombre"
                placeholder="Ej: Silla ergonómica"
              />
              <span class="form-field__error" *ngIf="isFieldInvalid('nombre')">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ getFieldError("nombre") }}
              </span>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="categoria"
                >Categoría <span class="form-field__req">*</span></label
              >
              <div class="form-field__select-wrap">
                <select
                  class="form-field__select"
                  [class.form-field__select--invalid]="
                    isFieldInvalid('categoria')
                  "
                  id="categoria"
                  formControlName="categoria"
                >
                  <option value="">Seleccione</option>
                  <option *ngFor="let cat of categorias" [value]="cat.value">
                    {{ cat.label }}
                  </option>
                </select>
              </div>
            </div>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="descripcion"
              >Descripción</label
            >
            <textarea
              class="form-field__textarea"
              id="descripcion"
              formControlName="descripcion"
              rows="2"
              placeholder="Descripción detallada (opcional)"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Card: Stock y Ubicación -->
      <div class="card" style="animation-delay: 0.09s">
        <div class="card__head">
          <i class="fa-solid fa-chart-simple"></i>
          <h3 class="card__title">Stock y Ubicación</h3>
        </div>
        <div class="card__body">
          <div class="field-row field-row--4col">
            <div class="form-field">
              <label class="form-field__label" for="unidadMedida"
                >Unidad <span class="form-field__req">*</span></label
              >
              <div class="form-field__select-wrap">
                <select
                  class="form-field__select"
                  id="unidadMedida"
                  formControlName="unidadMedida"
                >
                  <option
                    *ngFor="let unidad of unidadesMedida"
                    [value]="unidad.value"
                  >
                    {{ unidad.label }}
                  </option>
                </select>
              </div>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="stockActual"
                >Stock <span class="form-field__req">*</span></label
              >
              <input
                class="form-field__input"
                [class.form-field__input--invalid]="
                  isFieldInvalid('stockActual')
                "
                type="number"
                id="stockActual"
                formControlName="stockActual"
                min="0"
              />
            </div>
            <div class="form-field">
              <label class="form-field__label" for="precioUnitario"
                >Precio</label
              >
              <input
                class="form-field__input"
                type="number"
                id="precioUnitario"
                formControlName="precioUnitario"
                min="0"
                step="0.01"
                placeholder="0.00"
              />
            </div>
            <div class="form-field">
              <label class="form-field__label" for="ubicacionAlmacen"
                >Ubicación</label
              >
              <input
                class="form-field__input"
                type="text"
                id="ubicacionAlmacen"
                formControlName="ubicacionAlmacen"
                placeholder="Bodega, Estante..."
              />
            </div>
          </div>

          <div class="form-field">
            <label class="form-field__label" for="proveedor">Proveedor</label>
            <input
              class="form-field__input"
              type="text"
              id="proveedor"
              formControlName="proveedor"
              placeholder="Nombre del proveedor"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- ══ COLUMNA DERECHA ══ -->
    <div class="form-col">
      <!-- Card: Imagen -->
      <div class="card" style="animation-delay: 0.12s">
        <div class="card__head">
          <i class="fa-solid fa-camera"></i>
          <h3 class="card__title">Imagen</h3>
        </div>
        <div class="card__body">
          <div class="image-upload">
            <!-- Preview -->
            <div class="image-upload__preview" *ngIf="imagenPreview">
              <img
                [src]="imagenPreview"
                alt="Preview"
                class="image-upload__img"
              />
              <button
                type="button"
                class="image-upload__remove"
                (click)="removeImage()"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>

            <!-- Upload area -->
            <label
              class="image-upload__dropzone"
              for="imagen"
              *ngIf="!imagenPreview"
            >
              <input
                type="file"
                id="imagen"
                (change)="onFileSelected($event)"
                accept="image/jpeg,image/jpg,image/png,image/gif"
                hidden
              />
              <div class="image-upload__content">
                <div class="image-upload__icon">
                  <i class="fa-solid fa-cloud-arrow-up"></i>
                </div>
                <span class="image-upload__text">Click para subir imagen</span>
                <span class="image-upload__hint">JPG, PNG (máx. 5MB)</span>
              </div>
            </label>
          </div>
        </div>
      </div>

      <!-- Card: Observaciones -->
      <div class="card" style="animation-delay: 0.15s">
        <div class="card__head">
          <i class="fa-solid fa-bookmark"></i>
          <h3 class="card__title">Observaciones</h3>
        </div>
        <div class="card__body">
          <div class="form-field">
            <textarea
              class="form-field__textarea"
              id="observaciones"
              formControlName="observaciones"
              rows="3"
              placeholder="Notas adicionales..."
            ></textarea>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
